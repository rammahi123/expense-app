name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run lint
        run: |
          cd backend
          flake8 .

      - name: Run tests
        run: |
          cd backend
          PYTHONPATH=. pytest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin 429441944962.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker image
        run: |
          cd backend
          docker build -t expense-api .

      - name: Tag image
        run: |
          docker tag expense-api:latest 429441944962.dkr.ecr.ap-south-1.amazonaws.com/expense-api:latest

      - name: Push to ECR
        run: |
          docker push 429441944962.dkr.ecr.ap-south-1.amazonaws.com/expense-api:latest
